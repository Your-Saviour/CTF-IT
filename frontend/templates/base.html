<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CTF Platform{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e17;
            color: #c9d1d9;
            min-height: 100vh;
        }

        nav {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .brand {
            color: #58a6ff;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav .links {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
        }

        nav a:hover { color: #58a6ff; }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1, h2, h3 {
            color: #e6edf3;
            margin-bottom: 1rem;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #21262d;
        }

        th {
            color: #8b949e;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn-primary {
            background: #238636;
            color: #fff;
        }

        .btn-primary:hover { background: #2ea043; }

        .btn-danger {
            background: #da3633;
            color: #fff;
        }

        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }

        input[type="text"], input[type="password"], textarea, select {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem;
            border-radius: 6px;
            font-family: inherit;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-easy { background: #238636; color: #fff; }
        .badge-medium { background: #d29922; color: #000; }
        .badge-hard { background: #da3633; color: #fff; }

        .status-queued { color: #d29922; }
        .status-building { color: #58a6ff; }
        .status-ready { color: #238636; }
        .status-failed { color: #da3633; }

        .check { color: #238636; }
        .cross { color: #da3633; }

        .copy-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem;
            font-family: monospace;
            cursor: pointer;
            position: relative;
        }

        .copy-box:hover { border-color: #58a6ff; }

        .flash {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            background: #da363322;
            border: 1px solid #da3633;
            color: #f85149;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">&gt;_ CTF Platform</a>
        <div class="links">
            {% if user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/scoreboard">Scoreboard</a>
                {% if user.is_admin %}
                    <a href="/admin">Admin</a>
                {% endif %}
                <a href="/auth/logout">Logout</a>
            {% else %}
                <a href="/scoreboard">Scoreboard</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
