{% extends "base.html" %}
{% block title %}Admin - CTF Platform{% endblock %}
{% block content %}
<h1>Admin Panel</h1>

<!-- Event Config -->
<div class="card">
    <h3>Event Configuration</h3>
    <form id="event-form">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.25rem; color: #8b949e;">Event Name</label>
            <input type="text" id="event-name" value="{{ event.name if event else 'CTF Event' }}">
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.25rem; color: #8b949e;">
                <input type="checkbox" id="event-open" {% if not event or event.open %}checked{% endif %}>
                Event Open
            </label>
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.25rem; color: #8b949e;">Quota (JSON)</label>
            <textarea id="event-quota" rows="6">{{ event_quota | tojson(indent=2) }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <span id="event-status" style="margin-left: 1rem; color: #238636;"></span>
    </form>
</div>

<!-- Users -->
<div class="card">
    <h3>Users</h3>
    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Build Status</th>
                <th>Points</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="users-body">
            <tr><td colspan="4" style="color: #8b949e;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modules -->
<div class="card">
    <h3>Module Library</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Difficulty</th>
                <th>Points</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody id="modules-body">
            <tr><td colspan="6" style="color: #8b949e;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
// Event form
document.getElementById('event-form').addEventListener('submit', function(e) {
    e.preventDefault();
    let quota;
    try {
        quota = JSON.parse(document.getElementById('event-quota').value);
    } catch {
        alert('Invalid JSON in quota field');
        return;
    }
    fetch('/admin/event', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('event-name').value,
            open: document.getElementById('event-open').checked,
            quota: quota
        })
    }).then(() => {
        document.getElementById('event-status').textContent = 'Saved!';
        setTimeout(() => document.getElementById('event-status').textContent = '', 2000);
    });
});

// Load users
fetch('/admin/users')
    .then(r => r.json())
    .then(data => {
        const body = document.getElementById('users-body');
        body.innerHTML = data.map(u =>
            `<tr>
                <td>${u.username} ${u.is_admin ? '(admin)' : ''}</td>
                <td><span class="status-${u.build_status}">${u.build_status}</span></td>
                <td>${u.total_points}</td>
                <td><button class="btn btn-sm btn-danger" onclick="rebuild(${u.id})">Rebuild</button></td>
            </tr>`
        ).join('');
    });

function rebuild(userId) {
    if (!confirm('Rebuild image for this user? This will reset their progress.')) return;
    fetch(`/admin/rebuild/${userId}`, { method: 'POST' })
        .then(() => location.reload());
}

// Load modules
fetch('/admin/modules')
    .then(r => r.json())
    .then(data => {
        const body = document.getElementById('modules-body');
        body.innerHTML = data.map(m =>
            `<tr>
                <td>${m.id}</td>
                <td>${m.name}</td>
                <td>${m.type}</td>
                <td><span class="badge badge-${m.difficulty}">${m.difficulty}</span></td>
                <td>${m.points}</td>
                <td>${m.category}</td>
            </tr>`
        ).join('');
    });
</script>
{% endblock %}
