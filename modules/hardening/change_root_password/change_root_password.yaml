id: change_root_password
name: Change the default root password
description: The root account is using a known default password. It must be changed to a strong, unique password to prevent unauthorized access.
type: hardening
difficulty: easy
points: 100
category: authentication
tags: [password, root, credentials]
conflicts: []
requires: []
script: null
verification:
  type: password_changed
  user: root
suggested_fix: "echo 'root:$(openssl rand -base64 16)' | chpasswd"
hints:
  - "Think about what credentials an attacker would try first"
  - "Check if the root account has a real password set"
  - "Use the passwd command to set a new root password"
